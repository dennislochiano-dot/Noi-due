  <script type="module">
    // ============================================================
    // INCOLLA QUI LA TUA CONFIGURAZIONE FIREBASE
    // (Console Firebase → icona ingranaggio → Impostazioni progetto
    //  → "Le tue app" → app web → copia l'oggetto firebaseConfig)
    // ============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyC8xzwIgMb7WAZaJGvOck8wnYrDmligbM0",
      authDomain: "noi-due-82e5f.firebaseapp.com",
      projectId: "noi-due-82e5f",
      storageBucket: "noi-due-82e5f.firebasestorage.app",
      messagingSenderId: "169225194522",
      appId: "1:169225194522:web:1ac00eb41e53e18d4815a3",
    };

    // Identificativo fisso della vostra coppia: scope dei dati su Firestore.
    // Cambialo con qualcosa a te noto se vuoi un minimo di offuscamento in più.
    const COUPLE_ID = "dedi-e-prisci";

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs,
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    function dataRef(key) {
      return doc(db, "couples", COUPLE_ID, "data", key);
    }

    // ------------------------------------------------------------
    // Adattatore: stessa identica forma di window.storage che l'app
    // già usa (get/set/delete/list), ma dietro le quinte parla con
    // Firestore invece che con lo storage dell'artifact.
    // Il codice dell'app (safeGet/safeSet/resetAllData) non cambia.
    // ------------------------------------------------------------
    window.storage = {
      async get(key, shared) {
        try {
          const snap = await getDoc(dataRef(key));
          if (!snap.exists()) return null;
          return { key, value: snap.data().value, shared: !!shared };
        } catch (e) {
          return null;
        }
      },
      async set(key, value, shared) {
        try {
          await setDoc(dataRef(key), { value, updatedAt: Date.now() });
          return { key, value, shared: !!shared };
        } catch (e) {
          return null;
        }
      },
      async delete(key, shared) {
        try {
          await deleteDoc(dataRef(key));
          return { key, deleted: true, shared: !!shared };
        } catch (e) {
          return null;
        }
      },
      async list(prefix, shared) {
        try {
          const snap = await getDocs(collection(db, "couples", COUPLE_ID, "data"));
          const keys = [];
          snap.forEach((d) => {
            if (!prefix || d.id.startsWith(prefix)) keys.push(d.id);
          });
          return { keys, prefix, shared: !!shared };
        } catch (e) {
          return null;
        }
      },
    };

    // Login anonimo: nessuna schermata di accesso per voi due, ma le
    // regole di sicurezza di Firestore possono comunque richiedere
    // "utente autenticato" per bloccare scritture a caso da internet.
    signInAnonymously(auth)
      .then(() => {
        window.dispatchEvent(new Event("storage-ready"));
      })
      .catch((e) => {
        console.error("Errore di autenticazione Firebase:", e);
        // Anche in caso di errore, lasciamo partire l'app: le singole
        // chiamate falliranno con grazia grazie ai try/catch interni.
        window.dispatchEvent(new Event("storage-ready"));
      });
  </script>

function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 9301 + 49297) % 233280;
    const j = Math.floor((s / 233280) * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function flattenCategories(keys) {

    SHARED_CATEGORIES[k].items.forEach((text) => out.push({ text, cat: k, emoji: SHARED_CATEGORIES[k].emoji }));
  });
  return out;
}

function todayStr(d = new Date()) {

function weekKey(d = new Date()) {
  const onejan = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - onejan) / 86400000 + onejan.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${week}`;
}
function monthKey(d = new Date()) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}

function computeStreak(history) {
  const set = new Set(history.map((h) => h.date));
  let cursor = new Date();
  if (!set.has(todayStr(cursor))) cursor.setDate(cursor.getDate() - 1);
  let streak = 0;
  while (set.has(todayStr(cursor))) {
    streak++;
    cursor.setDate(cursor.getDate() - 1);
  }
  return streak;
}
function unlockedBadgeIds(history, notesCount, streak) {
  return BADGES.filter((b) => b.check(history, notesCount, streak)).map((b) => b.id);
}
// The couple's state is a rolling average of the most recent valid days,
// not a single day's snapshot — so one bad day doesn't swing the whole picture.
const STATE_WINDOW = 5;
function rollingState(history) {
  if (!history.length) return null;
  const recent = history.slice(-STATE_WINDOW);
  const avg = recent.reduce((s, e) => s + e.value, 0) / recent.length;
  return { avg, days: recent.length };
}

// Weekly numeric summary: last 7 calendar days vs the 7 before
const WEEK_DIMS = [
  { key: "avgMood", label: "Umore" },
  { key: "avgConnection", label: "Connessione" },
  { key: "avgCommunication", label: "Comunicazione" },
  { key: "avgAppreciation", label: "Apprezzamento ricevuto" },

  { key: "calm", label: "Calma" },
];
function daysAgoStr(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return todayStr(d);
}
function weeklySummary(history) {
  const curFrom = daysAgoStr(6);
  const prevFrom = daysAgoStr(13);
  const cur = history.filter((h) => h.date >= curFrom);
  const prev = history.filter((h) => h.date >= prevFrom && h.date < curFrom);
  if (cur.length < 2) return null;
  const dimAvg = (arr, key) =>
    arr.reduce((s, e) => {
      if (key === "calm") return s + (6 - (e.avgStress ?? 3));
      if (key === "value") return s + (e.value ?? 3);
      return s + (e[key] ?? 3);
    }, 0) / arr.length;
  const dims = WEEK_DIMS.map((d) => ({ ...d, avg: dimAvg(cur, d.key) }));
  const strongest = dims.reduce((a, b) => (b.avg > a.avg ? b : a));
  const weakest = dims.reduce((a, b) => (b.avg < a.avg ? b : a));
  let direction = null;
  if (prev.length >= 2) {
    const diff = dimAvg(cur, "value") - dimAvg(prev, "value");
    direction = diff > 0.15 ? "up" : diff < -0.15 ? "down" : "flat";
  }
  return { completed: cur.length, strongest, weakest, direction };
}
function periodComparison(history, period) {
  const current = history.slice(-period);
  const previous = history.slice(-2 * period, -period);
  if (previous.length < 2 || current.length < 2) return null;
  const avg = (a) => a.reduce((s, e) => s + e.value, 0) / a.length;
  return { diff: avg(current) - avg(previous) };
}
function valueToLevel(v) {
  return Math.min(5, Math.max(1, Math.round(v)));
}
function buzz() {
  try {
    if (navigator.vibrate) navigator.vibrate(8);

function presenceLabel(ts, gender) {
  if (!ts) return null;
  const attivo = gender === "f" ? "attiva" : "attivo";
  const diff = Date.now() - ts;
  const min = 60 * 1000;
  if (diff < 5 * min) return `${attivo} ora`;
  if (diff < 60 * min) return `${attivo} ${Math.round(diff / min)} min fa`;
  const d = new Date(ts);
  if (todayStr(d) === todayStr()) return `${attivo} oggi`;
  const y = new Date();
  y.setDate(y.getDate() - 1);
  if (todayStr(d) === todayStr(y)) return `${attivo} ieri`;
  return null;
}

async function safeGet(key, shared) {
  try {
    const res = await window.storage.get(key, shared);
    return res ? JSON.parse(res.value) : null;
  } catch {
    return null;
  }
}
async function safeSet(key, value, shared) {
  try {
    await window.storage.set(key, JSON.stringify(value), shared);
    return true;
  } catch {
    return false;
  }
}
async function resetAllData() {
  const prefixes = ["status:", "scores:", "notes:", "badges:", "insight:", "dailyq:", "lastseen:", "reflection:"];
  for (const p of prefixes) {
    try {
      const res = await window.storage.list(p, true);
      if (res && res.keys) {
        for (const k of res.keys) {
          try {
            await window.storage.delete(k, true);
          } catch {}
        }
      }
    } catch {}
  }
  for (const k of ["history", "settings"]) {
    try {
      await window.storage.delete(k, true);
    } catch {}
  }
}

}

// ============ animated streak ring ============
function StreakRing({ streak }) {
  const target = streak < 7 ? 7 : streak < 14 ? 14 : streak < 30 ? 30 : Math.ceil((streak + 1) / 30) * 30;
  const pct = Math.min(1, streak / target);
  const r = 34;
  const c = 2 * Math.PI * r;
  return (
    <div style={{ position: "relative", width: 88, height: 88 }}>
      <svg viewBox="0 0 88 88" width="88" height="88" style={{ transform: "rotate(-90deg)" }}>
        <circle cx="44" cy="44" r={r} fill="none" stroke="rgba(74,68,62,0.07)" strokeWidth="7" />
        <circle
          cx="44"
          cy="44"
          r={r}
          fill="none"
          stroke="url(#ringGrad)"
          strokeWidth="7"
          strokeLinecap="round"
          strokeDasharray={c}
          strokeDashoffset={c * (1 - pct)}
          className="rt-ring"
        />
        <defs>
          <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#F0B7A4" />
            <stop offset="100%" stopColor="#C9B8E8" />
          </linearGradient>
        </defs>
      </svg>
      <div
        style={{
          position: "absolute",
          inset: 0,
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          justifyContent: "center",
        }}
      >
        <span style={{ fontSize: 24, fontWeight: 700, letterSpacing: -0.5 }}>{streak}</span>
        <span style={{ fontSize: 9, color: "#A29B90", marginTop: -2 }}>di {target}</span>
      </div>
    </div>
  );
}

// ============ week strip ============
function WeekStrip({ history, onSelect }) {
  const byDate = Object.fromEntries(history.map((h) => [h.date, h]));
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const ds = todayStr(d);
    days.push({
      date: ds,
      label: d.toLocaleDateString("it-IT", { weekday: "narrow" }),
      entry: byDate[ds] || null,
      isToday: i === 0,
    });
  }
  return (
    <div style={{ display: "flex", justifyContent: "space-between" }}>
      {days.map((d, i) => (
        <button
          key={i}
          onClick={() => d.entry && onSelect && onSelect(d)}
          style={{
            display: "flex", flexDirection: "column", alignItems: "center", gap: 7,
            background: "none", border: "none", padding: 0, font: "inherit", color: "inherit",
            cursor: d.entry ? "pointer" : "default",
          }}
          aria-label={d.entry ? `Dettaglio del ${formatShort(d.date)}` : undefined}
        >
          <div
            className="rt-daydot"
            style={{
              width: 30,
              height: 30,
              borderRadius: "50%",
              background: d.entry ? EMO_COLORS[valueToLevel(d.entry.value) - 1] : "transparent",
              border: d.entry ? "none" : "1.5px dashed rgba(74,68,62,0.18)",
              boxShadow: d.entry ? "inset 0 -2px 4px rgba(0,0,0,0.06)" : "none",
              animationDelay: `${i * 60}ms`,
            }}
          />
          <span style={{ fontSize: 10.5, color: d.isToday ? "#4A443E" : "#B5AEA3", fontWeight: d.isToday ? 700 : 400 }}>
            {d.label}
          </span>
        </button>
      ))}
    </div>
  );
}

// ============ animated trend chart ============
function TrendChart({ data, color }) {
  const w = 300;
  const h = 130;
  const padX = 8;
  const padY = 14;
  if (!data || data.length < 2) {
    return (
      <div className="rt-empty" style={{ height: h }}>
        Ancora pochi giorni condivisi.
        <br />
        La vostra linea nascerà presto.
      </div>
    );
  }
  const stepX = (w - padX * 2) / (data.length - 1);
  const pts = data.map((d, i) => [padX + i * stepX, padY + (1 - (d.value - 1) / 4) * (h - padY * 2)]);
  // smooth curve
  let line = `M ${pts[0][0]},${pts[0][1]}`;
  for (let i = 1; i < pts.length; i++) {
    const [x0, y0] = pts[i - 1];
    const [x1, y1] = pts[i];
    const mx = (x0 + x1) / 2;
    line += ` C ${mx},${y0} ${mx},${y1} ${x1},${y1}`;
  }
  const area = `${line} L ${pts[pts.length - 1][0]},${h - padY} L ${pts[0][0]},${h - padY} Z`;
  const lastLevel = valueToLevel(data[data.length - 1].value);
  const lastColor = color || EMO_COLORS[lastLevel - 1];
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: h, overflow: "visible" }}>
      <defs>
        <linearGradient id="rtArea" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={lastColor} stopOpacity="0.28" />
          <stop offset="100%" stopColor={lastColor} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill="url(#rtArea)" className="rt-areafade" />
      <path d={line} fill="none" stroke={lastColor} strokeWidth="3" strokeLinecap="round" className="rt-draw" />
      <circle cx={pts[pts.length - 1][0]} cy={pts[pts.length - 1][1]} r="5" fill="#fff" stroke={lastColor} strokeWidth="3" />
      <text x={padX} y={h + 4} fill="#B5AEA3" fontSize="9">
        {formatShort(data[0].date)}
      </text>
      <text x={w - padX} y={h + 4} fill="#B5AEA3" fontSize="9" textAnchor="end">
        {formatShort(data[data.length - 1].date)}
      </text>
    </svg>
  );
}

  async function persist() {

  async function generateInsight() {
    if (history.length < 3 || insightLoading) return;
    setInsightLoading(true);
    try {
      const recent = history.slice(-14);
      const avgN = (k) => recent.reduce((s, e) => s + (e[k] ?? 3), 0) / recent.length;
      const avg = (k) => avgN(k).toFixed(1);
      const streakNow = computeStreak(history);

      // --- detected signals (only when meaningful) ---
      const signals = [];

      // 1. reciprocity gap between given and received appreciation
      const appreciationNum = avgN("avgAppreciation");
      const givenNum = avgN("avgGiven");
      const reciprocityGap = Math.abs(appreciationNum - givenNum);
      if (reciprocityGap >= 1.0) {
        signals.push(
          `c'è uno scarto di ${reciprocityGap.toFixed(1)} punti su 5 tra quanto la coppia sente di dare apprezzamento (${givenNum.toFixed(1)}) e quanto sente di riceverne (${appreciationNum.toFixed(1)}) — ${givenNum > appreciationNum ? "sembra dare più di quanto sente ricambiato" : "sembra ricevere più di quanto sente di ricambiare"}`
        );
      }

      // 2. biggest week-over-week change on any dimension
      const curWeek = history.filter((h) => h.date >= daysAgoStr(6));
      const prevWeek = history.filter((h) => h.date >= daysAgoStr(13) && h.date < daysAgoStr(6));
      if (curWeek.length >= 2 && prevWeek.length >= 2) {
        const wAvg = (arr, k) => arr.reduce((s, e) => s + (e[k] ?? 3), 0) / arr.length;
        const dimNames = {
          avgMood: "l'umore", avgConnection: "la connessione", avgCommunication: "la comunicazione",
          avgAppreciation: "l'apprezzamento ricevuto", avgGiven: "l'apprezzamento dato", avgStress: "lo stress",
        };
        let biggest = null;
        Object.keys(dimNames).forEach((k) => {
          const delta = wAvg(curWeek, k) - wAvg(prevWeek, k);
          if (!biggest || Math.abs(delta) > Math.abs(biggest.delta)) biggest = { k, delta };
        });
        if (biggest && Math.abs(biggest.delta) >= 0.7) {
          const goodDirection = biggest.k === "avgStress" ? biggest.delta < 0 : biggest.delta > 0;
          signals.push(
            `rispetto alla settimana precedente ${dimNames[biggest.k]} è ${goodDirection ? "migliorato" : "peggiorato"} in modo netto (${biggest.delta > 0 ? "+" : ""}${biggest.delta.toFixed(1)} punti)`
          );
        }
      }

      // 3. chronically weakest dimension over the whole 14-day window
      const posDims = { avgMood: "l'umore", avgConnection: "la connessione", avgCommunication: "la comunicazione", avgAppreciation: "l'apprezzamento ricevuto", avgGiven: "l'apprezzamento dato" };
      const dimVals = Object.keys(posDims).map((k) => ({ k, v: avgN(k) }));
      const weakest = dimVals.reduce((a, b) => (b.v < a.v ? b : a));
      const othersMean = dimVals.filter((d) => d.k !== weakest.k).reduce((s, d) => s + d.v, 0) / (dimVals.length - 1);
      if (othersMean - weakest.v >= 0.8) {
        signals.push(`${posDims[weakest.k]} è costantemente più basso del resto (${weakest.v.toFixed(1)}/5 contro una media di ${othersMean.toFixed(1)})`);
      }

      // 4. stress and communication moving together
      if (avgN("avgStress") >= 3.5 && avgN("avgCommunication") <= 2.8) {
        signals.push("lo stress è alto e la comunicazione sta faticando nello stesso periodo — probabilmente si influenzano a vicenda");
      }

      const signalNote = signals.length
        ? ` Segnali rilevati nei dati: ${signals.join("; ")}. Scegli SOLO il segnale più interessante e rendilo il centro del messaggio, con delicatezza e senza far sentire nessuno in colpa. Ignora gli altri.`
        : "";

      const promptText = `Sei il compagno emotivo di un'app per coppie. Dati aggregati (mai individuali) degli ultimi ${recent.length} giorni della coppia Dedi e Prisci: umore medio ${avg("avgMood")}/5, connessione media ${avg("avgConnection")}/5, comunicazione media ${avg("avgCommunication")}/5, apprezzamento ricevuto medio ${avg("avgAppreciation")}/5, apprezzamento dato medio ${avg("avgGiven")}/5, stress medio ${avg("avgStress")}/5, ${streakNow} giorni consecutivi di check-in.${signalNote} Scrivi in italiano un breve messaggio caldo e incoraggiante (max 3 frasi, tono amichevole tipo Headspace, dai del "voi"). Niente diagnosi, niente elenchi, solo il messaggio.`;

        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",

        .trim();

                    className={`rt-chip ${chartDim === d.key ? "on" : ""}`}
                    style={chartDim === d.key ? { background: d.color, color: "#4A443E", fontWeight: 650 } : {}}
                    onClick={() => setChartDim(d.key)}
                  >
                    {d.label}
                  </button>
                ))}
              </div>
              <TrendChart data={chartData} color={chartDim === "value" ? undefined : selectedDim.color} />
              {selectedDim.inverted && (
                <p style={{ marginTop: 10, fontSize: 11.5, color: "#B5AEA3" }}>Per lo stress, più bassa è la linea, meglio è.</p>
              )}
              {(() => {
                const cmp = periodComparison(history, period);
                if (!cmp || chartDim !== "value") return null;
                const up = cmp.diff > 0.15;
                const down = cmp.diff < -0.15;
                return (
                  <p style={{ marginTop: 14, fontSize: 12.5, color: "#8C8579" }}>
                    {up ? "Più sereni" : down ? "Un po' più pesanti" : "Stabili"} rispetto ai {period} giorni precedenti
                  </p>
                );
              })()}
            </div>

            {/* weekly numeric summary */}
            {(() => {
              const ws = weeklySummary(history);
              if (!ws) return null;
              return (
                <div className="rt-card" style={{ padding: "20px 22px", marginBottom: 14, display: "flex", flexDirection: "column", gap: 12 }}>
                  <p className="rt-title" style={{ fontSize: 15 }}>La settimana in numeri</p>
                  <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                      <span className="rt-sub" style={{ fontSize: 13 }}>Check-in completati</span>
                      <span style={{ fontWeight: 650, fontSize: 14 }}>{ws.completed} su 7</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                      <span className="rt-sub" style={{ fontSize: 13 }}>Punto forte</span>
                      <span style={{ fontWeight: 650, fontSize: 14 }}>{ws.strongest.label}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                      <span className="rt-sub" style={{ fontSize: 13 }}>Da coltivare</span>
                      <span style={{ fontWeight: 650, fontSize: 14 }}>{ws.weakest.label}</span>
                    </div>
                    {ws.direction && (
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                        <span className="rt-sub" style={{ fontSize: 13 }}>Rispetto alla settimana scorsa</span>
                        <span style={{ fontWeight: 650, fontSize: 14, color: ws.direction === "up" ? "#7FA86F" : ws.direction === "down" ? "#D08A76" : "#8C8579" }}>
                          {ws.direction === "up" ? "In salita ↗" : ws.direction === "down" ? "In discesa ↘" : "Stabile →"}
                        </span>
                      </div>
                    )}
                  </div>
                </div>
              );
            })()}

            {/* badges + journal row */}
            <div style={{ display: "flex", gap: 14, alignItems: "stretch" }}>
              <button
                className="rt-card rt-card-press"
                onClick={() => setScreen("badges")}
                style={{ flex: 1, padding: "18px 18px", border: "1px solid rgba(255,255,255,0.95)", textAlign: "left", font: "inherit", color: "inherit", display: "flex", flexDirection: "column", justifyContent: "center", gap: 6 }}
              >
                <p style={{ fontSize: 20 }}>
                  {unlockedBadgeIds(history, myNotes.length, streak).slice(-2).map((id) => BADGES.find((b) => b.id === id)?.emoji).join(" ") || "🏅"}
                </p>
                <p className="rt-title" style={{ fontSize: 14 }}>Traguardi</p>
                <p className="rt-sub" style={{ fontSize: 12 }}>
                  {unlockedBadgeIds(history, myNotes.length, streak).length} di {BADGES.length}
                </p>
              </button>
              <button
                className="rt-card rt-card-press"
                onClick={() => setScreen("journal")}
                style={{ flex: 1, padding: "18px 18px", border: "1px solid rgba(255,255,255,0.95)", textAlign: "left", font: "inherit", color: "inherit", display: "flex", flexDirection: "column", justifyContent: "center", gap: 6 }}
              >
                <p style={{ fontSize: 20 }}>✍️</p>
                <p className="rt-title" style={{ fontSize: 14 }}>I tuoi pensieri</p>
                <p className="rt-sub" style={{ fontSize: 12 }}>{myNotes.length} note private</p>
              </button>
            </div>
          </div>
        )}

        {/* ============ CHECK-IN ============ */}
        {!loading && screen === "checkin" && scale && (
          <div className="rt-fade" key={dim} style={{ paddingTop: 10, textAlign: "center" }}>
            <div className="rt-dots" style={{ marginBottom: 34 }}>
              {STEPS.map((s, i) => (
                <div key={s} className={`rt-dot ${i <= step ? "on" : ""}`} />
              ))}
            </div>
            <h1 className="rt-display" style={{ fontSize: 30, marginBottom: 30 }}>{questionText}</h1>
            <Fuzzy color={emoColor} level={displayLevel} size={185} id={dim} />
            <p key={level} className="rt-word-swap" style={{ fontSize: 26, fontWeight: 700, letterSpacing: -0.6, color: "#4A443E", marginTop: 22, marginBottom: 34 }}>
              {words[level - 1]}
            </p>
            <MoodSlider value={level} onChange={(v) => setValues((prev) => ({ ...prev, [dim]: v }))} inverted={scale.inverted} />
            <div style={{ marginTop: 36 }}>
              <button className="rt-btn" onClick={() => { buzz(); step < STEPS.length - 1 ? setStep(step + 1) : setScreen("note"); }}>
                Continua
              </button>
              <button className="rt-btn-soft" style={{ marginTop: 10 }} onClick={() => (step > 0 ? setStep(step - 1) : setScreen("home"))}>
                Indietro
              </button>
            </div>
          </div>
        )}

        {/* ============ NOTE ============ */}
        {!loading && screen === "note" && (
          <div className="rt-fade" style={{ paddingTop: 10, textAlign: "center" }}>
            <div className="rt-dots" style={{ marginBottom: 34 }}>
              {STEPS.map((s) => (
                <div key={s} className="rt-dot on" />
              ))}
            </div>
            {reflectionDay && <p className="rt-cap" style={{ marginBottom: 12 }}>Domanda del giorno</p>}
            <h1 className="rt-display" style={{ fontSize: 27, marginBottom: 10 }}>{prompt}</h1>
            <p className="rt-sub" style={{ marginBottom: 30 }}>Facoltativo · {other(me)} non lo vedrà mai</p>
            <textarea
              className="rt-textarea"
              rows={4}
              value={note}
              onChange={(e) => setNote(e.target.value)}
              placeholder="Scrivi liberamente…"
            />
            <div style={{ marginTop: 30 }}>
              <button className="rt-btn" onClick={() => { buzz(); persist(); }} disabled={saving}>
                {saving ? "Salvataggio…" : "Salva il check-in"}
              </button>
              <button className="rt-btn-soft" style={{ marginTop: 10 }} onClick={() => setScreen("checkin")}>
                Indietro
              </button>
            </div>
          </div>
        )}

        {/* ============ DAILY SHARED QUESTION ============ */}
        {!loading && screen === "dailyq" && (
          <div className="rt-fade" style={{ paddingTop: 10, textAlign: "center" }}>
            <p className="rt-cap" style={{ marginBottom: 12 }}>{sharedQuestion.emoji} Domanda del giorno</p>
            <h1 className="rt-display" style={{ fontSize: 27, marginBottom: 10 }}>{sharedQuestion.text}</h1>
            <p className="rt-sub" style={{ marginBottom: 30 }}>
              Risposta privata. Si rivelerà a entrambi solo quando avrete risposto tutti e due.
            </p>
            <textarea
              className="rt-textarea"
              rows={4}
              value={dailyAnswerDraft}
              onChange={(e) => setDailyAnswerDraft(e.target.value)}
              placeholder="Scrivi la tua risposta…"
            />
            <div style={{ marginTop: 30 }}>
              <button className="rt-btn" onClick={() => { buzz(); submitDailyAnswer(); }} disabled={dailySaving || !dailyAnswerDraft.trim()}>
                {dailySaving ? "Invio…" : "Invia la risposta"}
              </button>
              <button className="rt-btn-soft" style={{ marginTop: 10 }} onClick={() => setScreen("home")}>
                Indietro
              </button>
            </div>
            <button
              className="rt-chip"
              style={{ marginTop: 26 }}
              onClick={toggleIntimacy}
            >
              {intimacyEnabled ? "🔥 Domande sull'intimità: attive" : "🔥 Includi anche domande sull'intimità"}
            </button>
          </div>
        )}

        {/* ============ DONE ============ */}
        {!loading && screen === "done" && (
          <div className="rt-fade" style={{ paddingTop: 24, textAlign: "center" }}>
            {newBadges.length > 0 && (
              <div
                className="rt-card rt-pop"
                style={{ padding: "16px 20px", marginBottom: 24, background: "linear-gradient(135deg, rgba(240,183,164,0.25), rgba(201,184,232,0.25))" }}
              >
                <p className="rt-cap" style={{ marginBottom: 8 }}>Nuovo traguardo</p>
                {newBadges.map((b) => (
                  <p key={b.id} style={{ fontSize: 15, fontWeight: 650 }}>
                    {b.emoji}&ensp;{b.title}
                  </p>
                ))}
              </div>
            )}
            <div style={{ display: "flex", justifyContent: "center", alignItems: "flex-end" }}>
              <div style={{ marginRight: bothDoneToday ? -30 : 16, transition: "margin 0.7s cubic-bezier(.4,0,.2,1)" }}>
                <Fuzzy color={PARTNER_COLORS[me]} level={5} size={125} id="done-me" />
              </div>
              <div style={{ opacity: status[other(me)] ? 1 : 0.35, transition: "opacity 0.6s ease" }}>
                <Fuzzy color={PARTNER_COLORS[other(me)]} level={status[other(me)] ? 5 : 3} size={125} id="done-other" float={!!status[other(me)]} />
              </div>
            </div>
            <h1 className="rt-display" style={{ fontSize: 27, marginTop: 26 }}>
              {bothDoneToday ? "Vi siete\nritrovati, oggi." : `Ora tocca\na ${other(me)}.`}
            </h1>
            <p className="rt-sub" style={{ marginTop: 10 }}>
              {bothDoneToday ? "Il check-in di entrambi è al sicuro." : "Il tuo momento è salvato. La giornata si completa in due."}
            </p>
            <button className="rt-btn" style={{ marginTop: 30 }} onClick={() => { buzz(); setScreen("home"); }}>
              Torna alla home
            </button>
          </div>
        )}

        {/* ============ BADGES ============ */}
        {!loading && screen === "badges" && (
          <div className="rt-fade">
            <button className="rt-chip" style={{ marginBottom: 20 }} onClick={() => setScreen("home")}>← Home</button>
            <h1 className="rt-display" style={{ fontSize: 28, marginBottom: 6 }}>Traguardi</h1>
            <p className="rt-sub" style={{ marginBottom: 24 }}>
              {unlockedBadgeIds(history, myNotes.length, streak).length} di {BADGES.length} sbloccati
            </p>
            <div className="rt-stagger" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {BADGES.map((b) => {
                const unlocked = unlockedBadgeIds(history, myNotes.length, streak).includes(b.id);
                return (
                  <div
                    key={b.id}
                    className="rt-card"
                    style={{
                      padding: "20px 14px",
                      textAlign: "center",
                      opacity: unlocked ? 1 : 0.4,
                      display: "flex",
                      flexDirection: "column",
                      alignItems: "center",
                      justifyContent: "center",
                      gap: 8,
                    }}
                  >
                    <div style={{ fontSize: 30, filter: unlocked ? "none" : "grayscale(1)" }}>{b.emoji}</div>
                    <div style={{ fontWeight: 600, fontSize: 12.5, lineHeight: 1.35, letterSpacing: -0.2 }}>{b.title}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ============ JOURNAL ============ */}
        {!loading && screen === "journal" && (
          <div className="rt-fade">
            <button className="rt-chip" style={{ marginBottom: 20 }} onClick={() => setScreen("home")}>← Home</button>
            <h1 className="rt-display" style={{ fontSize: 28, marginBottom: 6 }}>I tuoi pensieri</h1>
            <p className="rt-sub" style={{ marginBottom: 24 }}>Visibili soltanto a te, {me}.</p>
            {myNotes.length === 0 && (
              <div className="rt-card" style={{ padding: 30 }}>
                <p className="rt-empty">Ancora nessuna nota.<br />Il prossimo check-in è una buona occasione.</p>
              </div>
            )}
            <div className="rt-stagger">
              {myNotes.map((n, i) => (
                <div key={i} className="rt-card" style={{ padding: "18px 20px", marginBottom: 12, textAlign: "left" }}>
                  <p className="rt-cap" style={{ marginBottom: 6 }}>{formatShort(n.date)}</p>
                  {n.question && <p style={{ fontSize: 12.5, fontStyle: "italic", color: "#A29B90", marginBottom: 5 }}>{n.question}</p>}
                  <p style={{ fontSize: 14, lineHeight: 1.55 }}>{n.note}</p>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


  // Aspetta che Firebase/l'autenticazione anonima siano pronti,
  // poi monta l'app — stesso identico componente di prima.
  function Boot() {
    const [ready, setReady] = useState(false);
    useEffect(() => {
      const onReady = () => setReady(true);
      window.addEventListener("storage-ready", onReady, { once: true });
      return () => window.removeEventListener("storage-ready", onReady);
    }, []);
    if (!ready) return null;
    return <RelationshipTracker />;
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Boot />);
</script>
</body>
</html>
